<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica</title>

    <link rel="stylesheet" href="./css/index.css">
</head>

<body>

    <main class="calculator">

        <section class="display-container">
            <input type="text" id="display" readonly>
        </section>

        <section class="buttons">

            <button>C</button>
            <button>√</button>
            <button>x²</button>
            <button>x³</button>
            <button>/</button>
            <button>%</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>*</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>

            <button>0</button>
            <button>.</button>
            <button>=</button>

        </section>

    </main>

    <script src="./js/script.js"></script>

</body>

</html>
